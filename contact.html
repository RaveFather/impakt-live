<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Impakt &amp; Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF4A00;--dark:#111;--light:#fff;--gray:#fafafa;}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#fff;color:#222;line-height:1.6}
    nav{background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.08);padding:.5rem 1rem;display:flex;justify-content:space-between;align-items:center}
    nav ul{display:flex;gap:1rem;list-style:none}
    nav a{font-weight:600;color:#222;text-decoration:none}
    nav a:hover{color:var(--primary)}
    .container{max-width:1200px;margin:auto;padding:2rem}
    form{display:grid;gap:.8rem;max-width:500px;margin:auto}
    input,textarea{width:100%;padding:.6rem;border:1px solid #ccc;border-radius:4px}
    button{background:var(--primary);color:#fff;padding:.6rem 1.2rem;border:none;border-radius:4px;cursor:pointer}
    button:hover{background:#e64300}
  </style>
</head>
<body>
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="info.html">Info</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<div class="container">
  <h1>Contact Us</h1>
  <p>Impakt Sports &amp; Fitness, 123 Main Road, Cape Town, South Africa 🇿🇦</p>
  <p>Phone: <strong>+27 21 555 1234</strong></p>
  <p>Email: <strong>info@impakt.co.za</strong></p>
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" placeholder="Your name" required>
    <input type="email" name="email" placeholder="Email address" required>
    <textarea name="message" rows="4" placeholder="Your message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>
<footer>
  <p>© 2026 Impakt Sports &amp; Fitness – Cape Town</p>
</footer>
</body>
</html>
